<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" id="theme-color-meta" content="#0a0e1a">
<link rel="manifest" href="manifest.json">
<title>Blueprint Maker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

/* ── THEMES ─────────────────────────────────────────────────────────── */
:root {
  --bg:#0a0e1a; --canvas-bg:#060c1f; --grid-minor:#192038; --grid-major:#1e2d4e;
  --panel:#0d1526; --border:#182540; --btn:#111d33; --btnhov:#182440; --btnact:#1e3a6e;
  --text:#c8d6e5; --dim:#3a5070; --bright:#e8f4fd;
  --accent:#00d4ff; --red:#ef4444; --green:#22c55e;
  --label-bg:rgba(6,12,31,.9); --label-border:#1a2540; --label-text:#c8d6e5;
  --default-line:#000000;
  --mono:'JetBrains Mono',monospace;
}
[data-theme="light"] {
  --bg:#f0f4f8; --canvas-bg:#ffffff; --grid-minor:#dde3ea; --grid-major:#b8c6d4;
  --panel:#e4eaf0; --border:#c8d6e0; --btn:#d8e4ed; --btnhov:#c8d4de; --btnact:#a8bfcf;
  --text:#1a2535; --dim:#5a7090; --bright:#0d1520;
  --label-bg:rgba(255,255,255,.92); --label-border:#c8d6e0; --label-text:#1a2535;
  --default-line:#000000;
}

/* ── BASE ────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px}
body{display:flex;flex-direction:column}
body.photo-mode #hdr,body.photo-mode #tb,body.photo-mode #dp,body.photo-mode #sb,body.photo-mode #stbar{display:none!important}
body.photo-mode #main{flex:1}

/* ── HEADER ──────────────────────────────────────────────────────────── */
#hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:4px 8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0;min-height:36px}
h1{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;white-space:nowrap}
.sep{width:1px;height:16px;background:var(--border);flex-shrink:0}

/* ── BUTTONS ─────────────────────────────────────────────────────────── */
.btn{background:var(--btn);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:3px;cursor:pointer;font-family:var(--mono);font-size:10px;transition:all .1s;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;user-select:none}
.btn:hover{background:var(--btnhov);border-color:var(--dim);color:var(--bright)}
.btn.on{background:var(--btnact);border-color:var(--accent);color:var(--accent)}
.btn.red{border-color:#4a1515;color:var(--red)}.btn.red:hover{background:#1a0808;border-color:var(--red)}
.btn.grn{border-color:#1a4a2a;color:var(--green)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.zg{display:flex;align-items:center;gap:1px;background:var(--btn);border:1px solid var(--border);border-radius:3px;padding:0 3px}
.zg button{background:none;border:none;color:var(--text);cursor:pointer;padding:2px 4px;font-size:13px;line-height:1}.zg button:hover{color:var(--accent)}
.zg input{background:none;border:none;color:var(--accent);font-family:var(--mono);font-size:10px;width:42px;text-align:center;outline:none}
select{background:var(--btn);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:2px 5px;border-radius:3px;outline:none;cursor:pointer}

/* ── TOOLBAR ─────────────────────────────────────────────────────────── */
#tb{background:var(--panel);border-bottom:1px solid var(--border);padding:4px 8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0}
.lbl{color:var(--dim);font-size:9px;letter-spacing:.1em}
.color-wrap{display:flex;align-items:center;gap:3px}
.hex-in{background:var(--btn);border:1px solid var(--border);color:var(--bright);font-family:var(--mono);font-size:10px;padding:2px 5px;border-radius:3px;width:68px;outline:none}
.hex-in:focus{border-color:var(--accent)}
.cswatch{width:20px;height:20px;border-radius:3px;border:1px solid var(--border);cursor:pointer;flex-shrink:0}
.num-in{background:var(--btn);border:1px solid var(--border);color:var(--bright);font-family:var(--mono);font-size:10px;padding:2px 5px;border-radius:3px;width:54px;outline:none;text-align:center}
.num-in:focus{border-color:var(--accent)}

/* ── DRAW PANEL ──────────────────────────────────────────────────────── */
#dp{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 8px;display:none;align-items:flex-end;gap:5px;flex-wrap:wrap;flex-shrink:0}
#dp.on{display:flex}
.stab{padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--btn);color:var(--dim);cursor:pointer;font-size:9px;font-family:var(--mono)}
.stab.on{background:var(--btnact);border-color:var(--accent);color:var(--accent)}
.cg{display:flex;gap:3px;align-items:center}
.cg label{color:var(--dim);font-size:9px;min-width:14px}
.ci{background:var(--btn);border:1px solid var(--border);color:var(--bright);font-family:var(--mono);font-size:11px;padding:2px 5px;border-radius:3px;width:52px;outline:none}
.ci:focus{border-color:var(--accent)}.ci.ok{border-color:#1a4a2a;color:var(--green)}
.arr{color:var(--dim);font-size:10px}
#poly-points{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.poly-pair{display:flex;gap:2px;align-items:center;background:var(--btn);border:1px solid var(--border);border-radius:3px;padding:2px 4px}
.poly-pair label{color:var(--dim);font-size:9px;min-width:12px}
.poly-pair .ci{width:44px}
.poly-pair .del-pt{background:none;border:none;color:var(--dim);cursor:pointer;font-size:10px;padding:0 2px}
.poly-pair .del-pt:hover{color:var(--red)}

/* ── SHAPE LIBRARY PANEL ─────────────────────────────────────────────── */
#shape-lib{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 8px;display:none;align-items:flex-start;gap:6px;flex-wrap:wrap;flex-shrink:0;max-height:120px;overflow-y:auto}
#shape-lib.on{display:flex}
.lib-item{background:var(--btn);border:1px solid var(--border);border-radius:4px;padding:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:60px}
.lib-item:hover{border-color:var(--accent)}
.lib-item.sel{border-color:var(--accent);background:var(--btnact)}
.lib-item canvas{border:1px solid var(--dim);border-radius:2px;background:var(--canvas-bg)}
.lib-item span{font-size:8px;color:var(--text);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.lib-item input{font-size:8px;background:var(--btn);border:1px solid var(--accent);color:var(--bright);border-radius:2px;width:58px;outline:none;font-family:var(--mono)}

/* ── MAIN ────────────────────────────────────────────────────────────── */
#main{flex:1;display:flex;overflow:hidden;min-height:0}
#cwrap{flex:1;overflow:auto;position:relative;cursor:crosshair}
#cwrap.lk{cursor:not-allowed}
#ci{position:relative;display:inline-block}
canvas#gc{display:block;position:absolute;top:0;left:0;pointer-events:none}
svg#sv{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
#dl{position:absolute;top:0;left:0}
#hi{position:absolute;pointer-events:none;display:none;z-index:5}

/* ── SIDEBAR ─────────────────────────────────────────────────────────── */
#sb{width:195px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0}
#sb.hide{display:none}
.ss2{border-bottom:1px solid var(--border);padding:8px}
.st{font-size:9px;font-weight:600;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.li{padding:4px 6px;border:1px solid transparent;border-radius:3px;cursor:pointer;margin-bottom:2px;transition:all .1s}
.li:hover{background:var(--btn);border-color:var(--border)}
.li.sel{background:var(--btnact);border-color:var(--accent)}
.li-id{font-size:9px;color:var(--accent);font-weight:600}
.li-cd{font-size:9px;color:var(--dim);margin-top:1px}
.li-ln{font-size:10px;color:var(--bright);margin-top:1px}
.li-ac{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.mb{background:var(--btn);border:1px solid var(--border);color:var(--dim);padding:1px 5px;border-radius:2px;cursor:pointer;font-family:var(--mono);font-size:9px}
.mb:hover{color:var(--bright);border-color:var(--dim)}
.mb.del:hover{color:var(--red);border-color:#4a1515}
/* Label size input in sidebar */
.lsize-wrap{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--dim)}
.lsize-in{background:var(--btn);border:1px solid var(--border);color:var(--bright);font-family:var(--mono);font-size:10px;padding:1px 4px;border-radius:3px;width:50px;outline:none}
.lsize-in:focus{border-color:var(--accent)}

/* ── STATUS ──────────────────────────────────────────────────────────── */
#stbar{background:var(--panel);border-top:1px solid var(--border);padding:2px 8px;display:flex;gap:12px;font-size:9px;color:var(--dim);flex-shrink:0}
#stbar span{color:var(--text)}

/* ── DOTS ────────────────────────────────────────────────────────────── */
.dot{position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,.2);transform:translate(-50%,-50%);cursor:pointer;z-index:10}
.dot:hover{transform:translate(-50%,-50%) scale(1.5)}
.dot.blue{width:10px;height:10px;background:#3b82f6;box-shadow:0 0 5px #3b82f6}
.dot.red{width:13px;height:13px;background:var(--red);box-shadow:0 0 7px var(--red);z-index:12}
.dot.poly{width:9px;height:9px;background:#a855f7;box-shadow:0 0 5px #a855f7}

/* ── NOTIFY ──────────────────────────────────────────────────────────── */
#nf{position:fixed;top:40px;right:10px;background:var(--panel);border:1px solid var(--accent);color:var(--accent);padding:4px 10px;border-radius:3px;font-size:10px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
#nf.on{opacity:1}
#photo-hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:rgba(255,255,255,.5);font-size:10px;padding:4px 12px;border-radius:12px;pointer-events:none;z-index:50;display:none}
body.photo-mode #photo-hint{display:block}

/* ── SAVE AREA ───────────────────────────────────────────────────────── */
.sa{display:flex;gap:3px}
.sa textarea{background:var(--btn);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:3px;width:110px;resize:none;outline:none}
.sa textarea:focus{border-color:var(--accent)}
</style>
</head>
<body>

<div id="hdr">
  <h1>◈ BLUEPRINT</h1>
  <div class="sep"></div>
  <button class="btn" id="b-draw">✏ Draw</button>
  <button class="btn" id="b-bp">◫ Blueprint</button>
  <button class="btn on" id="b-grid">⊞ Grid</button>
  <button class="btn" id="b-lib">◧ Shapes</button>
  <button class="btn" id="b-lock">⊘ Lock</button>
  <button class="btn" id="b-photo" title="Photo mode">📷</button>
  <button class="btn" id="b-theme" title="Toggle theme">☀</button>
  <div class="sep"></div>
  <button class="btn" id="b-undo" disabled>↩</button>
  <button class="btn" id="b-redo" disabled>↪</button>
  <div class="sep"></div>
  <div class="zg">
    <button id="zo">−</button>
    <input id="zi" type="text" value="1.0×">
    <button id="zi2">+</button>
  </div>
  <div class="sep"></div>
  <button class="btn grn" id="b-save">⬆ Save</button>
  <div class="sa">
    <textarea id="li" rows="1" placeholder="Paste save…"></textarea>
    <button class="btn" id="b-load">⬇</button>
  </div>
  <button class="btn" id="b-svg">⎘ SVG</button>
  <button class="btn" id="b-sb">≡</button>
</div>

<div id="tb">
  <span class="lbl">STYLE</span>
  <select id="ls"><option value="solid" selected>Solid</option><option value="dashed">Dashed</option><option value="dotted">Dotted</option></select>
  <span class="lbl">COLOR</span>
  <div class="color-wrap">
    <span style="color:var(--dim);font-size:10px">#</span>
    <input class="hex-in" id="hex-in" type="text" value="000000" maxlength="6">
    <div class="cswatch" id="cswatch" style="background:#000000"></div>
  </div>
  <div class="sep"></div>
  <button class="btn on" id="b-len">Lengths</button>
  <button class="btn on" id="b-ang">Angles</button>
  <button class="btn on" id="b-dots">Dots</button>
  <div class="sep"></div>
  <span class="lbl">SIZE</span>
  <input class="num-in" id="size-in" type="text" value="50" title="Grid size">
  <button class="btn" id="b-max" title="Fill screen">⤢ Max</button>
</div>

<div id="dp">
  <div id="shape-tabs" style="display:flex;gap:3px">
    <button class="stab on" data-shape="line">LINE</button>
    <button class="stab" data-shape="circle">CIRCLE</button>
    <button class="stab" data-shape="polygon">POLYGON</button>
  </div>
  <div class="sep"></div>
  <!-- Line inputs -->
  <div id="line-inputs" style="display:flex;gap:5px;align-items:flex-end;flex-wrap:wrap">
    <div class="cg"><label>X1</label><input class="ci" id="x1" placeholder="0"></div>
    <div class="cg"><label>Y1</label><input class="ci" id="y1" placeholder="0"></div>
    <span class="arr">→</span>
    <div class="cg"><label>X2</label><input class="ci" id="x2" placeholder="0"></div>
    <div class="cg"><label>Y2</label><input class="ci" id="y2" placeholder="0"></div>
    <span id="autofill-hint" style="color:var(--green);font-size:9px;align-self:center;display:none">↲ auto-straight</span>
  </div>
  <!-- Circle inputs -->
  <div id="circle-inputs" style="display:none;gap:5px;align-items:flex-end;flex-wrap:wrap">
    <div class="cg"><label>CX</label><input class="ci" id="cx" placeholder="0"></div>
    <div class="cg"><label>CY</label><input class="ci" id="cy" placeholder="0"></div>
    <div class="cg"><label>R</label><input class="ci" id="cr" placeholder="5"></div>
  </div>
  <!-- Polygon inputs -->
  <div id="polygon-inputs" style="display:none;flex-direction:column;gap:4px">
    <div id="poly-points"></div>
    <div style="display:flex;gap:4px;margin-top:2px">
      <button class="btn" id="b-poly-add">+ Point</button>
      <button class="btn" id="b-poly-close" title="Close polygon (connect last to first)">⊙ Close</button>
    </div>
  </div>
  <button class="btn on" id="b-draw-shape">▶ Draw</button>
  <button class="btn" id="b-clr-c">✕</button>
  <span id="ph" style="color:var(--dim);font-size:9px;font-style:italic;align-self:center">Click grid or dots</span>
</div>

<!-- Shape Library -->
<div id="shape-lib">
  <div id="lib-items" style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start"></div>
  <div style="display:flex;flex-direction:column;gap:4px;margin-left:8px">
    <button class="btn grn" id="b-lib-save" title="Save current polygon as shape">+ Save Shape</button>
    <button class="btn" id="b-lib-place" title="Place selected shape">▷ Place</button>
  </div>
</div>

<div id="main">
  <div id="cwrap">
    <div id="ci">
      <canvas id="gc"></canvas>
      <svg id="sv" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="dl"></div>
      <div id="hi">
        <svg width="20" height="20" style="overflow:visible">
          <circle cx="10" cy="10" r="4" fill="none" stroke="var(--accent)" stroke-width="1.2" opacity=".5"/>
          <line x1="10" y1="0" x2="10" y2="20" stroke="var(--accent)" stroke-width=".5" opacity=".35"/>
          <line x1="0" y1="10" x2="20" y2="10" stroke="var(--accent)" stroke-width=".5" opacity=".35"/>
        </svg>
      </div>
    </div>
  </div>
  <div id="sb">
    <div class="ss2">
      <div class="st">Shapes <span id="sc" style="color:var(--accent)">0</span></div>
      <div id="sl"></div>
    </div>
    <div class="ss2">
      <div class="st">Labels</div>
      <div class="lsize-wrap">
        <span>Size (cells):</span>
        <input class="lsize-in" id="label-size" type="text" value="1" title="Label height in grid cells">
      </div>
      <div style="margin-top:6px;font-size:9px;color:var(--dim)">Smart avoid:
        <label style="cursor:pointer"><input type="checkbox" id="label-avoid" checked> enabled</label>
      </div>
    </div>
    <div class="ss2">
      <div class="st">Canvas</div>
      <div style="display:flex;flex-direction:column;gap:4px;font-size:10px">
        <div style="display:flex;justify-content:space-between"><span style="color:var(--dim)">Grid</span><span id="i-g">∞</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--dim)">Zoom</span><span id="i-z" style="color:var(--accent)">1.0×</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--dim)">Shapes</span><span id="i-s">0</span></div>
      </div>
    </div>
  </div>
</div>

<div id="stbar">
  <div>Grid <span id="s-g">50×50</span></div>
  <div>Zoom <span id="s-z" style="color:var(--accent)">1.0×</span></div>
  <div>Shapes <span id="s-s">0</span></div>
  <div>Cursor <span id="s-c">—</span></div>
</div>
<div id="photo-hint">Double-click or Esc to exit photo mode</div>
<div id="nf"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
const S = {
  shapes: [],
  shapeLibrary: [],        // saved polygon shapes
  canvasSize: 50,
  zoom: 1.0,
  drawMode: false,
  blueprintMode: false,
  gridVisible: true,
  locked: false,
  showLengths: true,
  showAngles: true,
  showDots: true,
  theme: 'light',           // 'dark' | 'light'
  lineStyle: 'solid',
  lineColor: '#000000',
  currentShape: 'line',
  coords: {x1:'',y1:'',x2:'',y2:''},
  circCoords: {cx:'',cy:'',cr:''},
  polyPoints: [{x:'',y:''}],   // polygon points
  polyClose: false,
  selectedId: null,
  selectedLibItem: null,
  history: [],
  historyIdx: -1,
  nextId: 1,
  sidebarOpen: true,
  libOpen: false,
  redDot: null,
  photoMode: false,
  labelSizeCells: 1.0,
  labelAvoid: true,
};

const CELL = 20;
const g2p = g => g * CELL * S.zoom;
const p2g = p => p / (CELL * S.zoom);
const cpx = () => Math.ceil(S.canvasSize * CELL * S.zoom);

// DOM
const GC = document.getElementById('gc');
const SV = document.getElementById('sv');
const DL = document.getElementById('dl');
const CW = document.getElementById('cwrap');
const CI = document.getElementById('ci');
const HI = document.getElementById('hi');
const DP = document.getElementById('dp');

// ═══ NOTIFY ═══════════════════════════════════════════════════════════════
let _nt;
function notify(msg, color) {
  const el = document.getElementById('nf');
  el.textContent = msg; el.style.borderColor = color||'var(--accent)'; el.style.color = color||'var(--accent)';
  el.classList.add('on'); clearTimeout(_nt); _nt = setTimeout(()=>el.classList.remove('on'), 2000);
}

// ═══ THEME ════════════════════════════════════════════════════════════════
  function applyTheme(t) {
  S.theme = t;
  document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : '');
  document.getElementById('b-theme').textContent = t === 'light' ? '🌙' : '☀';
  document.getElementById('theme-color-meta').content = t === 'light' ? '#f0f4f8' : '#0a0e1a';
  // ── NEW: reset default line color to theme-appropriate default ──
  if (S.lineColor === '#000000' || S.lineColor === '#c8d6e5') {
    S.lineColor = t === 'light' ? '#000000' : '#c8d6e5';
    const hexVal = S.lineColor.replace('#','');
    document.getElementById('hex-in').value = hexVal;
    document.getElementById('cswatch').style.background = S.lineColor;
  }
  render();
  }
// ═══ HISTORY ══════════════════════════════════════════════════════════════
function saveHist() {
  const snap = JSON.parse(JSON.stringify({shapes:S.shapes, canvasSize:S.canvasSize}));
  S.history = S.history.slice(0, S.historyIdx+1);
  S.history.push(snap); S.historyIdx = S.history.length-1;
  updHist();
}
function undo() {
  if (S.historyIdx<=0) return; S.historyIdx--;
  const h = S.history[S.historyIdx];
  S.shapes = JSON.parse(JSON.stringify(h.shapes)); S.canvasSize = h.canvasSize;
  document.getElementById('size-in').value = S.canvasSize;
  computeRedDot(); render();
}
function redo() {
  if (S.historyIdx>=S.history.length-1) return; S.historyIdx++;
  const h = S.history[S.historyIdx];
  S.shapes = JSON.parse(JSON.stringify(h.shapes)); S.canvasSize = h.canvasSize;
  document.getElementById('size-in').value = S.canvasSize;
  computeRedDot(); render();
}
function updHist() {
  document.getElementById('b-undo').disabled = S.historyIdx<=0;
  document.getElementById('b-redo').disabled = S.historyIdx>=S.history.length-1;
}

// ═══ CANVAS SIZE ══════════════════════════════════════════════════════════
function expandIfNeeded(coords) {
  const mx = Math.max(...coords.filter(n=>!isNaN(n)));
  if (mx > S.canvasSize - 1) {
    S.canvasSize = Math.ceil(mx + 2);
    document.getElementById('size-in').value = S.canvasSize;
  }
}
function setMaxCanvas() {
  const hh = document.getElementById('hdr').offsetHeight +
             document.getElementById('tb').offsetHeight +
             (S.drawMode ? DP.offsetHeight : 0) +
             document.getElementById('stbar').offsetHeight;
  const sw = S.sidebarOpen ? document.getElementById('sb').offsetWidth : 0;
  const cols = Math.floor((window.innerWidth - sw - 2) / (CELL * S.zoom));
  const rows = Math.floor((window.innerHeight - hh - 2) / (CELL * S.zoom));
  S.canvasSize = Math.max(10, Math.max(cols, rows));
  document.getElementById('size-in').value = S.canvasSize;
  render();
}

// ═══ GRID ═════════════════════════════════════════════════════════════════
function renderGrid() {
  const dpr = window.devicePixelRatio || 1; // 1. Get screen pixel density
  const sz = cpx();
  
  // 2. Scale internal drawing buffer to physical pixels
  GC.width = sz * dpr; 
  GC.height = sz * dpr;
  
  // 3. Keep logical display size (CSS) unchanged
  CI.style.width = sz+'px'; CI.style.height = sz+'px';
  SV.setAttribute('width',sz); SV.setAttribute('height',sz);
  SV.style.width = sz+'px'; SV.style.height = sz+'px';
  
  const ctx = GC.getContext('2d');
  
  // 4. Scale the context so your old math works perfectly
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  
  ctx.clearRect(0,0,sz,sz);

  // --- YOUR ORIGINAL LOGIC BELOW THIS LINE REMAINS 100% UNCHANGED ---

  if (S.blueprintMode) { ctx.fillStyle='#050e2a'; ctx.fillRect(0,0,sz,sz); }
  else if (S.theme==='light') { ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,sz,sz); }

  if (!S.gridVisible) return;
  const cell = CELL * S.zoom;
  const isLight = S.theme==='light';
  for (let i=0; i<=S.canvasSize; i++) {
    const maj = i%5===0;
    ctx.strokeStyle = S.blueprintMode
      ? (maj?'#1a3060':'#0d1f3c')
      : isLight ? (maj?'#b8c6d4':'#dde3ea') : (maj?'#1e2d4e':'#192038');
    ctx.lineWidth = maj?.7:.4;
    const p = i*cell;
    ctx.beginPath(); ctx.moveTo(p,0); ctx.lineTo(p,sz); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,p); ctx.lineTo(sz,p); ctx.stroke();
  }
  // Axis numbers every 10
  ctx.fillStyle = S.blueprintMode?'#1a3060':isLight?'#b8c6d4':'#1e2d4e';
  ctx.font = `${Math.max(6,7*S.zoom)}px JetBrains Mono,monospace`;
  for (let i=0; i<=S.canvasSize; i+=10) {
    const p = i*cell;
    if (i>0) { ctx.fillText(i,p+2,9*S.zoom); ctx.fillText(i,2,p+8*S.zoom); }
  }
}

// ═══ RED DOT ══════════════════════════════════════════════════════════════
function computeRedDot() {
  const pts = [];
  S.shapes.forEach(s => {
    if (s.type==='line') { pts.push({x:s.x1,y:s.y1}); pts.push({x:s.x2,y:s.y2}); }
    else if (s.type==='circle') { pts.push({x:s.cx,y:s.cy}); pts.push({x:s.cx+s.r,y:s.cy}); }
    else if (s.type==='polygon') s.pts.forEach(p=>pts.push(p));
  });
  if (pts.length<2) { S.redDot=null; return; }
  let maxD=0,p1=pts[0],p2=pts[1];
  for (let i=0;i<pts.length;i++) for (let j=i+1;j<pts.length;j++) {
    const d=(pts[i].x-pts[j].x)**2+(pts[i].y-pts[j].y)**2;
    if(d>maxD){maxD=d;p1=pts[i];p2=pts[j];}
  }
  S.redDot={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
}

// ═══ LABEL COLLISION AVOIDANCE ════════════════════════════════════════════
const placedLabels = [];
function resetLabels() { placedLabels.length=0; }

function placeLabel(cx,cy,angle,text,id,color) {
  const labelH = S.labelSizeCells * CELL * S.zoom;
  const charW = labelH * 0.55;
  const w = text.length * charW + 8;
  const h = labelH + 4;

  // Try multiple positions: perpendicular offsets from line center
  const rad = angle * Math.PI/180;
  const perpX = -Math.sin(rad);
  const perpY = Math.cos(rad);
  const offsets = [h*0.7, -h*0.7, h*1.5, -h*1.5, h*2.5, -h*2.5, 0];

  let bestX = cx, bestY = cy - h*0.7;
  if (S.labelAvoid) {
    for (const off of offsets) {
      const tx = cx + perpX*off - w/2;
      const ty = cy + perpY*off - h/2;
      const rect = {x:tx,y:ty,w,h};
      let ok = true;
      for (const pl of placedLabels) {
        if (rectsOverlap(rect,pl)) { ok=false; break; }
      }
      if (ok) { bestX=tx; bestY=ty; break; }
    }
  } else {
    bestX = cx + perpX*h*0.7 - w/2;
    bestY = cy + perpY*h*0.7 - h/2;
  }

  placedLabels.push({x:bestX,y:bestY,w,h});

  const fo = svgEl('foreignObject',{
    x: bestX, y: bestY, width: w+20, height: h+8,
    style:`pointer-events:${S.locked?'none':'all'};overflow:visible`
  });
  const div = document.createElement('div');
  const fs = Math.max(7, labelH * 0.75);
  div.style.cssText = `font-family:JetBrains Mono,monospace;font-size:${fs}px;color:${color||'var(--text)'};background:var(--label-bg);padding:1px 4px;border-radius:2px;border:1px solid var(--label-border);white-space:nowrap;cursor:pointer;display:inline-block`;
  div.textContent = text;
  div.onclick = e => { e.stopPropagation(); S.selectedId=id; renderSidebar(); };
  fo.appendChild(div); SV.appendChild(fo);
}

function rectsOverlap(a,b) {
  return !(a.x+a.w < b.x-4 || b.x+b.w < a.x-4 || a.y+a.h < b.y-4 || b.y+b.h < a.y-4);
}

// ═══ SVG HELPERS ══════════════════════════════════════════════════════════
function svgEl(tag,attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}
// ═══ RESOLVE COLOR ════════════════════════════════════════════════════════
// Maps #000000 (default/dark-invisible) to readable theme color
function resolveColor(c) {
  if (!c || c === '#000000') {
    // In dark/blueprint mode use light text; in light mode keep black
    if (S.blueprintMode) return '#7eb8e0';
    return S.theme === 'dark' ? '#c8d6e5' : '#000000';
  }
  return c;
  }
// ═══ RENDER SHAPES ════════════════════════════════════════════════════════
function renderShapes() {
  while(SV.firstChild) SV.removeChild(SV.firstChild);
  resetLabels();
  S.shapes.forEach(s=>{
    const color = resolveColor(s.color||S.lineColor);
    const dash = s.style==='dashed'?'6,3':s.style==='dotted'?'2,4':'';
    if(s.type==='line') renderLine(s,color,dash);
    else if(s.type==='circle') renderCircle(s,color,dash);
    else if(s.type==='polygon') renderPolygon(s,color,dash);
  });
}

function renderLine(s,color,dash) {
  const x1=g2p(s.x1),y1=g2p(s.y1),x2=g2p(s.x2),y2=g2p(s.y2);
  const lw = S.blueprintMode?'1.2':'1.5';
  const bpDash = S.blueprintMode && !dash ? '6,3' : dash;
  const attrs = {x1,y1,x2,y2,stroke:color,'stroke-width':lw};
  if(bpDash) attrs['stroke-dasharray']=bpDash;
  SV.appendChild(svgEl('line',attrs));

  if(S.blueprintMode) {
    const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
    const px=-dy/len*28*S.zoom,py=dx/len*28*S.zoom;
    SV.appendChild(svgEl('line',{x1:x1+px,y1:y1+py,x2:x2+px,y2:y2+py,stroke:'#4a6080','stroke-width':'1','stroke-dasharray':'3,4'}));
    [[x1,y1],[x2,y2]].forEach(([cx,cy])=>SV.appendChild(svgEl('line',{x1:cx,y1:cy,x2:cx+px,y2:cy+py,stroke:'#2a3f6a','stroke-width':'.7'})));
  }

  if(!s.hideLabel&&(S.showLengths||S.showAngles)) {
    const cx=(x1+x2)/2,cy=(y1+y2)/2;
    const angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI;
    const angleDeg=Math.round(Math.atan2(-(y2-y1),x2-x1)*180/Math.PI);
    const lenVal=parseFloat(s.length);
    let lbl='';
    if(S.showLengths) lbl+=S.blueprintMode?`${(lenVal*10).toFixed(1)}mm`:lenVal.toFixed(2);
    if(S.showLengths&&S.showAngles) lbl+=' ';
    if(S.showAngles) lbl+=`${angleDeg>180?angleDeg-360:angleDeg}°`;
    placeLabel(cx,cy,angle,lbl,s.id,color);
  }
}

function renderCircle(s,color,dash) {
  const cx=g2p(s.cx),cy=g2p(s.cy),r=g2p(s.r);
  if(S.blueprintMode) {
    const ex=cx+r;
    const attrs={x1:cx,y1:cy,x2:ex,y2:cy,stroke:color,'stroke-width':'1.5'};
    if(dash) attrs['stroke-dasharray']=dash;
    else attrs['stroke-dasharray']='6,3';
    SV.appendChild(svgEl('line',attrs));
    SV.appendChild(svgEl('circle',{cx,cy,r:2.5,fill:color,opacity:'.7'}));
    SV.appendChild(svgEl('line',{x1:ex,y1:cy-5,x2:ex,y2:cy+5,stroke:color,'stroke-width':'1',opacity:'.6'}));
    if(!s.hideLabel&&S.showLengths) placeLabel((cx+ex)/2,cy,0,`r=${(parseFloat(s.r)*10).toFixed(1)}mm`,s.id,color);
  } else {
    const attrs={cx,cy,r,fill:'none',stroke:color,'stroke-width':'1.5'};
    if(dash) attrs['stroke-dasharray']=dash;
    SV.appendChild(svgEl('circle',attrs));
    SV.appendChild(svgEl('line',{x1:cx-4,y1:cy,x2:cx+4,y2:cy,stroke:color,'stroke-width':'1',opacity:'.5'}));
    SV.appendChild(svgEl('line',{x1:cx,y1:cy-4,x2:cx,y2:cy+4,stroke:color,'stroke-width':'1',opacity:'.5'}));
    if(!s.hideLabel&&S.showLengths) placeLabel(cx,cy-r-10,0,`r=${s.r}`,s.id,color);
  }
}

function renderPolygon(s,color,dash) {
  if(!s.pts||s.pts.length<2) return;
  const pts = s.pts.map(p=>({x:g2p(p.x),y:g2p(p.y)}));
  for(let i=0;i<pts.length-1;i++) {
    drawSegment(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,color,dash,s.id,s.hideLabel,i);
  }
  if(s.closed&&pts.length>2) {
    const last=pts[pts.length-1],first=pts[0];
    drawSegment(last.x,last.y,first.x,first.y,color,dash,s.id,s.hideLabel,pts.length-1);
  }
  if(!S.locked) {
    const last=pts[pts.length-1];
    addDelBtn(last.x,last.y-14*Math.max(.7,S.zoom),s.id);
  }
}

function drawSegment(x1,y1,x2,y2,color,dash,id,hideLabel,segIdx) {
  const lw = S.blueprintMode?'1.2':'1.5';
  const bpDash = S.blueprintMode&&!dash?'6,3':dash;
  const attrs={x1,y1,x2,y2,stroke:color,'stroke-width':lw};
  if(bpDash) attrs['stroke-dasharray']=bpDash;
  SV.appendChild(svgEl('line',attrs));
  if(!hideLabel&&S.showLengths&&!S.blueprintMode) {
    const dx=x2-x1,dy=y2-y1;
    const len=Math.sqrt(dx*dx+dy*dy)/(CELL*S.zoom);
    const angle=Math.atan2(dy,dx)*180/Math.PI;
    placeLabel((x1+x2)/2,(y1+y2)/2,angle,len.toFixed(2),id+'.'+segIdx,color);
  }
  if(S.blueprintMode&&!hideLabel&&S.showLengths) {
    const dx=x2-x1,dy=y2-y1;
    const len=Math.sqrt(dx*dx+dy*dy)/(CELL*S.zoom);
    const angle=Math.atan2(dy,dx)*180/Math.PI;
    placeLabel((x1+x2)/2,(y1+y2)/2,angle,`${(len*10).toFixed(1)}mm`,id+'.'+segIdx,color);
  }
}

// ═══ DOTS ═════════════════════════════════════════════════════════════════
function renderDots() {
  DL.innerHTML='';
  if(!S.drawMode||S.locked||!S.showDots) return;
  const ptMap=new Map();
  S.shapes.forEach(s=>{
    if(s.type==='line'){ptMap.set(`${s.x1},${s.y1}`,{x:s.x1,y:s.y1});ptMap.set(`${s.x2},${s.y2}`,{x:s.x2,y:s.y2});}
    else if(s.type==='circle'){ptMap.set(`${s.cx},${s.cy}`,{x:s.cx,y:s.cy});ptMap.set(`${s.cx+s.r},${s.cy}`,{x:s.cx+s.r,y:s.cy});}
    else if(s.type==='polygon') s.pts.forEach(p=>ptMap.set(`${p.x},${p.y}`,p));
  });
  ptMap.forEach(pt=>{
    const d=document.createElement('div');
    d.className=`dot ${S.currentShape==='polygon'?'poly':'blue'}`;
    d.style.left=g2p(pt.x)+'px'; d.style.top=g2p(pt.y)+'px';
    d.title=`(${pt.x},${pt.y})`;
    d.addEventListener('click',e=>{e.stopPropagation();fillCoord(pt.x,pt.y);});
    DL.appendChild(d);
  });
  if(S.redDot){
    const d=document.createElement('div');
    d.className='dot red'; d.style.left=g2p(S.redDot.x)+'px'; d.style.top=g2p(S.redDot.y)+'px';
    d.title=`Mid (${S.redDot.x.toFixed(2)},${S.redDot.y.toFixed(2)})`;
    d.addEventListener('click',e=>{e.stopPropagation();fillCoord(S.redDot.x,S.redDot.y);});
    DL.appendChild(d);
  }
  DL.style.pointerEvents='all';
}

// ═══ COORD FILL ═══════════════════════════════════════════════════════════
function fillCoord(x,y) {
  const xs=x.toString(),ys=y.toString();
  if(S.currentShape==='line'){
    const c=S.coords;
    if(c.x1===''&&c.y1===''&&c.x2===''&&c.y2==='') setCoords({x1:xs,y1:ys,x2:'',y2:''});
    else if(c.x1!==''&&c.y1!==''&&c.x2===''&&c.y2==='') setCoords({...c,x2:xs,y2:ys});
    else setCoords({x1:xs,y1:ys,x2:'',y2:''});
  } else if(S.currentShape==='circle'){
    const c=S.circCoords;
    if(c.cx===''&&c.cy==='') setCircCoords({cx:xs,cy:ys,cr:c.cr});
    else if(c.cx!==''&&c.cy!==''&&c.cr==='') {
      const dist=Math.sqrt((x-parseFloat(c.cx))**2+(y-parseFloat(c.cy))**2).toFixed(2);
      setCircCoords({...c,cr:dist.toString()});
    }
  } else if(S.currentShape==='polygon'){
    // Fill next empty poly point
    const pairs=S.polyPoints;
    const empty=pairs.findIndex(p=>p.x===''||p.y==='');
    if(empty>=0){ pairs[empty]={x:xs,y:ys}; renderPolyInputs(); }
    else { pairs.push({x:xs,y:ys}); renderPolyInputs(); }
  }
}

function setCoords(c){ S.coords=c; updateLineInputs(); }
function updateLineInputs(){
  const c=S.coords;
  ['x1','y1','x2','y2'].forEach(f=>{const el=document.getElementById(f);if(el){el.value=c[f];el.classList.toggle('ok',c[f]!=='');}});
  // Auto-fill hint
  const hint=document.getElementById('autofill-hint');
  if((c.x1!==''&&c.x2!==''&&c.x1!==c.x2)&&c.y1!==''&&c.y2==='') hint.style.display='inline';
  else if((c.y1!==''&&c.y2!==''&&c.y1!==c.y2)&&c.x1!==''&&c.x2==='') hint.style.display='inline';
  else hint.style.display='none';
}
function setCircCoords(c){ S.circCoords=c; ['cx','cy','cr'].forEach(f=>{const el=document.getElementById(f);if(el){el.value=c[f];el.classList.toggle('ok',c[f]!=='');}});}

// ═══ POLYGON POINT UI ═════════════════════════════════════════════════════
function renderPolyInputs() {
  const container=document.getElementById('poly-points');
  container.innerHTML='';
  S.polyPoints.forEach((pt,i)=>{
    const wrap=document.createElement('div');
    wrap.className='poly-pair';
    wrap.innerHTML=`<label>P${i+1}</label>

      <input class="ci" placeholder="y" value="${pt.y}" oninput="updatePolyPt(${i},'y',this.value)">
      ${S.polyPoints.length>1?`<button class="del-pt" onclick="removePolyPt(${i})">✕</button>`:''}`;
    container.appendChild(wrap);

window.updatePolyPt=(i,f,v)=>{ if(v===''||/^-?\d*\.?\d*$/.test(v)){S.polyPoints[i][f]=v;} };
window.removePolyPt=(i)=>{ S.polyPoints.splice(i,1); renderPolyInputs(); };

// ═══ DRAW ═════════════════════════════════════════════════════════════════
function drawShape() {
  if(S.locked) return;
  if(S.currentShape==='line') drawLine();
  else if(S.currentShape==='circle') drawCircle();
  else if(S.currentShape==='polygon') drawPolygon();
}

function drawLine() {
  let {x1,y1,x2,y2}=S.coords;
  // Auto-fill straight lines
  const nx1=parseFloat(x1),ny1=parseFloat(y1),nx2=parseFloat(x2),ny2=parseFloat(y2);
  if(!isNaN(nx1)&&!isNaN(nx2)&&nx1!==nx2&&!isNaN(ny1)&&y2==='') y2=ny1.toString();
  if(!isNaN(nx1)&&!isNaN(nx2)&&nx1!==nx2&&!isNaN(parseFloat(y2))&&y1==='') y1=y2;
  if(!isNaN(ny1)&&!isNaN(parseFloat(y2))&&ny1!==parseFloat(y2)&&!isNaN(nx1)&&x2==='') x2=nx1.toString();
  if(!isNaN(ny1)&&!isNaN(parseFloat(y2))&&ny1!==parseFloat(y2)&&!isNaN(parseFloat(x2))&&x1==='') x1=x2;
  if([x1,y1,x2,y2].some(v=>v==='')) return;
  const [a1,b1,a2,b2]=[x1,y1,x2,y2].map(parseFloat);
  if([a1,b1,a2,b2].some(isNaN)) return;
  expandIfNeeded([a1,b1,a2,b2]);
  S.shapes.push({id:S.nextId++,type:'line',x1:a1,y1:b1,x2:a2,y2:b2,
    length:Math.sqrt((a2-a1)**2+(b2-b1)**2).toFixed(2),color:S.lineColor,style:S.lineStyle,hideLabel:false});
  setCoords({x1:'',y1:'',x2:'',y2:''}); computeRedDot(); saveHist(); render(); notify('Line drawn');
}

function drawCircle() {
  const {cx,cy,cr}=S.circCoords;
  if(cx===''||cy===''||cr==='') { notify('Need CX, CY, R','#f97316'); return; }
  const [ncx,ncy,nr]=[cx,cy,cr].map(parseFloat);
  if([ncx,ncy,nr].some(isNaN)||nr<=0) return;
  expandIfNeeded([ncx+nr,ncy+nr,ncx-nr,ncy-nr]);
  S.shapes.push({id:S.nextId++,type:'circle',cx:ncx,cy:ncy,r:nr,color:S.lineColor,style:S.lineStyle,hideLabel:false});
  setCircCoords({cx:'',cy:'',cr:''}); computeRedDot(); saveHist(); render(); notify('Circle drawn');
}

function drawPolygon(pts, closed) {
  const points = pts || S.polyPoints;
  const isClose = closed !== undefined ? closed : S.polyClose;
  const validPts = points.filter(p=>p.x!==''&&p.y!==''&&!isNaN(parseFloat(p.x))&&!isNaN(parseFloat(p.y)))
    .map(p=>({x:parseFloat(p.x),y:parseFloat(p.y)}));
  if(validPts.length<2) { notify('Need at least 2 points','#f97316'); return; }
  expandIfNeeded(validPts.flatMap(p=>[p.x,p.y]));
  S.shapes.push({id:S.nextId++,type:'polygon',pts:validPts,closed:isClose,color:S.lineColor,style:S.lineStyle,hideLabel:false});
  S.polyPoints=[{x:'',y:''}]; S.polyClose=false; renderPolyInputs();
  computeRedDot(); saveHist(); render(); notify('Polygon drawn');
}

// ═══ SHAPE LIBRARY ════════════════════════════════════════════════════════
function saveToLibrary() {
  const validPts = S.polyPoints.filter(p=>p.x!==''&&p.y!==''&&!isNaN(parseFloat(p.x))&&!isNaN(parseFloat(p.y)))
    .map(p=>({x:parseFloat(p.x),y:parseFloat(p.y)}));
  if(validPts.length<2) { notify('Need ≥2 points to save','#f97316'); return; }
  const name = `Shape ${S.shapeLibrary.length+1}`;
  S.shapeLibrary.push({id:S.nextId++,pts:validPts,closed:S.polyClose,name});
  renderLibrary(); notify('Saved to library','#22c55e');
}

function renderLibrary() {
  const container=document.getElementById('lib-items');
  container.innerHTML='';
  S.shapeLibrary.forEach((sh,i)=>{
    const item=document.createElement('div');
    item.className='lib-item'+(S.selectedLibItem===i?' sel':'');
    // Draw thumbnail
    const c=document.createElement('canvas');
    c.width=60; c.height=50;
    drawShapeThumbnail(c,sh);
    item.appendChild(c);
    if(S.selectedLibItem===i) {
      const inp=document.createElement('input');
      inp.value=sh.name; inp.onchange=e=>{sh.name=e.target.value;renderLibrary();};
      inp.onclick=e=>e.stopPropagation();
      item.appendChild(inp);
    } else {
      const span=document.createElement('span'); span.textContent=sh.name; item.appendChild(span);
    }
    item.onclick=()=>{S.selectedLibItem=S.selectedLibItem===i?null:i;renderLibrary();};
    container.appendChild(item);
  });
}

function drawShapeThumbnail(canvas, sh) {
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!sh.pts||sh.pts.length<2) return;
  const xs=sh.pts.map(p=>p.x),ys=sh.pts.map(p=>p.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const rng=Math.max(maxX-minX,maxY-minY)||1;
  const pad=6;
  const sc=(Math.min(canvas.width,canvas.height)-pad*2)/rng;
  ctx.strokeStyle='#00d4ff'; ctx.lineWidth=1.5; ctx.setLineDash([]);
  ctx.beginPath();
  sh.pts.forEach((p,i)=>{
    const px=(p.x-minX)*sc+pad+(canvas.width-(maxX-minX)*sc)/2;
    const py=(p.y-minY)*sc+pad+(canvas.height-(maxY-minY)*sc)/2;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  });
  if(sh.closed) ctx.closePath();
  ctx.stroke();
}

function placeFromLibrary() {
  if(S.selectedLibItem===null) { notify('Select a shape first','#f97316'); return; }
  const sh=S.shapeLibrary[S.selectedLibItem];
  // Copy points into polygon input
  S.polyPoints=sh.pts.map(p=>({x:p.x.toString(),y:p.y.toString()}));
  S.polyClose=sh.closed;
  // Switch to polygon mode
  S.currentShape='polygon';
  document.querySelectorAll('.stab').forEach(t=>{t.classList.toggle('on',t.dataset.shape==='polygon');});
  document.getElementById('line-inputs').style.display='none';
  document.getElementById('circle-inputs').style.display='none';
  document.getElementById('polygon-inputs').style.display='flex';
  renderPolyInputs();
  notify('Shape loaded — adjust points then ▶ Draw');
}

window.deleteShape=id=>{
  if(S.locked)return;
  S.shapes=S.shapes.filter(s=>s.id!==id);
  if(S.selectedId===id)S.selectedId=null;
  computeRedDot(); saveHist(); render();
};

// ═══ SIDEBAR ══════════════════════════════════════════════════════════════
function renderSidebar() {
  const list=document.getElementById('sl');

  ['sc','i-s','s-s'].forEach(id=>document.getElementById(id).textContent=S.shapes.length);
  document.getElementById('i-g').textContent=`${S.canvasSize}×${S.canvasSize}`;
  document.getElementById('s-g').textContent=`${S.canvasSize}×${S.canvasSize}`;
  document.getElementById('i-z').textContent=S.zoom.toFixed(1)+'×';
  document.getElementById('s-z').textContent=S.zoom.toFixed(1)+'×';
  if(!S.shapes.length){list.innerHTML='<div style="color:var(--dim);font-size:9px">No shapes</div>';return;}
  S.shapes.forEach(s=>{
    const div=document.createElement('div');
    div.className='li'+(S.selectedId===s.id?' sel':'');
    const typeChar={line:'—',circle:'○',polygon:'◇'}[s.type]||'?';
    let info='';
    if(s.type==='line') info=`(${s.x1},${s.y1})→(${s.x2},${s.y2})`;
    else if(s.type==='circle') info=`c(${s.cx},${s.cy}) r=${s.r}`;
    else if(s.type==='polygon') info=`${s.pts.length} pts${s.closed?' closed':''}`;
    div.innerHTML=`<div class="li-id" style="color:${s.color}">${typeChar} S${s.id}</div>
      <div class="li-cd">${info}</div>
      <div class="li-ac">
        <button class="mb" onclick="toggleLabel(${s.id})">${s.hideLabel?'Show lbl':'Hide lbl'}</button>
        <button class="mb del" onclick="deleteShape(${s.id})">Del</button>
      </div>`;
    div.onclick=()=>{S.selectedId=s.id;renderSidebar();};
    list.appendChild(div);
  });
}
window.toggleLabel=id=>{const s=S.shapes.find(x=>x.id===id);if(s){s.hideLabel=!s.hideLabel;saveHist();render();}};

// ═══ PHOTO MODE ════════════════════════════════════════════════════════════
function enterPhotoMode() {
  S.photoMode=true;
  document.body.classList.add('photo-mode');
  // Center blueprint with 1-cell padding
  if(S.shapes.length>0) {
    const allX=[],allY=[];
    S.shapes.forEach(s=>{
      if(s.type==='line'){allX.push(s.x1,s.x2);allY.push(s.y1,s.y2);}
      else if(s.type==='circle'){allX.push(s.cx-s.r,s.cx+s.r);allY.push(s.cy-s.r,s.cy+s.r);}
      else if(s.type==='polygon') s.pts.forEach(p=>{allX.push(p.x);allY.push(p.y);});
    });
    const minX=Math.min(...allX),maxX=Math.max(...allX);
    const minY=Math.min(...allY),maxY=Math.max(...allY);
    const pad=1; // 1 cell padding
    // Set canvas to fit blueprint with padding
    S.canvasSize=Math.ceil(Math.max(maxX-minX,maxY-minY))+pad*2+1;
    // Scroll to top-left of content
    setTimeout(()=>{
      CW.scrollLeft=Math.max(0,g2p(minX-pad));
      CW.scrollTop=Math.max(0,g2p(minY-pad));
    },50);
  }
  render();
}
function exitPhotoMode() {
  S.photoMode=false;
  document.body.classList.remove('photo-mode');
  document.getElementById('size-in').value=S.canvasSize;
  render();
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&S.photoMode)exitPhotoMode();});
CW.addEventListener('dblclick',()=>{if(S.photoMode)exitPhotoMode();});

// ═══ SAVE / LOAD ══════════════════════════════════════════════════════════
function saveData() {
  const data={shapes:S.shapes,library:S.shapeLibrary,canvasSize:S.canvasSize,theme:S.theme};
  const str=`BLUEPRINTER_LINES_START\n${JSON.stringify(data)}\nBLUEPRINTER_LINES_END`;
  navigator.clipboard.writeText(str).then(()=>notify('Copied ✓','#22c55e')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=str;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);notify('Copied ✓','#22c55e');
  });
}
function loadData(str) {
  try {
    const s=str.indexOf('BLUEPRINTER_LINES_START'),e=str.indexOf('BLUEPRINTER_LINES_END');
    if(s===-1||e===-1)throw 0;
    const data=JSON.parse(str.substring(s+'BLUEPRINTER_LINES_START'.length,e).trim());
    // Support both old format (array) and new format (object)
    if(Array.isArray(data)) {
      S.shapes=data.map(d=>({id:S.nextId++,type:d.type||'line',
        ...(d.type==='circle'?{cx:+d.cx,cy:+d.cy,r:+d.r}:
           d.type==='polygon'?{pts:d.pts,closed:!!d.closed}:
           {x1:+d.x1,y1:+d.y1,x2:+d.x2,y2:+d.y2,length:Math.sqrt((d.x2-d.x1)**2+(d.y2-d.y1)**2).toFixed(2)}),
        color:d.color||'#000000',style:d.style||'solid',hideLabel:false}));
    } else {
      if(data.shapes) S.shapes=data.shapes.map(d=>({...d,id:S.nextId++}));
      if(data.library) S.shapeLibrary=data.library;
      if(data.canvasSize) { S.canvasSize=data.canvasSize; document.getElementById('size-in').value=S.canvasSize; }
      if(data.theme) applyTheme(data.theme);
    }
    computeRedDot(); saveHist(); render(); notify(`Loaded ✓`,'#22c55e');
  } catch(e){notify('Load failed','#ef4444');}
}

// ═══ SVG EXPORT ═══════════════════════════════════════════════════════════
function exportSvg() {
  const sz=S.canvasSize*CELL;
  const bg=S.theme==='light'?'#ffffff':'#060c1f';
  const gc=S.theme==='light'?'#dde3ea':'#192038';
  let out=`<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" style="background:${bg}">
<defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse">
<path d="M20 0L0 0 0 20" fill="none" stroke="${gc}" stroke-width=".5"/></pattern></defs>
<rect width="${sz}" height="${sz}" fill="url(#g)"/>`;
  S.shapes.forEach(s=>{
    const c=s.color||'#000000';
    const d=s.style==='dashed'?'stroke-dasharray="6,3"':s.style==='dotted'?'stroke-dasharray="2,4"':'';
    if(s.type==='line'){
      out+=`<line x1="${s.x1*20}" y1="${s.y1*20}" x2="${s.x2*20}" y2="${s.y2*20}" stroke="${c}" stroke-width="1.5" ${d}/>`;
    } else if(s.type==='circle'){
      out+=`<circle cx="${s.cx*20}" cy="${s.cy*20}" r="${s.r*20}" fill="none" stroke="${c}" stroke-width="1.5" ${d}/>`;
    } else if(s.type==='polygon'&&s.pts){
      const pts2=s.pts.map(p=>`${p.x*20},${p.y*20}`).join(' ');
      out+=`<polyline points="${pts2}" fill="none" stroke="${c}" stroke-width="1.5" ${d}${s.closed?' stroke-linejoin="round"':''}/>`
      if(s.closed&&s.pts.length>2){
        const l=s.pts[s.pts.length-1],f=s.pts[0];
        out+=`<line x1="${l.x*20}" y1="${l.y*20}" x2="${f.x*20}" y2="${f.y*20}" stroke="${c}" stroke-width="1.5" ${d}/>`;
      }
    }
  });
  out+='</svg>';
  navigator.clipboard.writeText(out).then(()=>notify('SVG copied ✓','#22c55e')).catch(()=>notify('Failed','#ef4444'));
}

// ═══ ZOOM ═════════════════════════════════════════════════════════════════
function setZoom(z){
  S.zoom=Math.max(.1,Math.min(8,Math.round(z*10)/10));
  document.getElementById('zi').value=S.zoom.toFixed(1)+'×';
  render();
}
document.getElementById('zo').onclick=()=>setZoom(S.zoom-.25);
document.getElementById('zi2').onclick=()=>setZoom(S.zoom+.25);
document.getElementById('zi').addEventListener('change',e=>{const v=parseFloat(e.target.value.replace('×',''));if(!isNaN(v))setZoom(v);else e.target.value=S.zoom.toFixed(1)+'×';});
document.getElementById('zi').addEventListener('keydown',e=>{if(e.key==='Enter')e.target.blur();});
CW.addEventListener('wheel',e=>{if(e.ctrlKey||e.metaKey){e.preventDefault();setZoom(S.zoom+(e.deltaY<0?.1:-.1));}},{passive:false});

let _td=0;
CW.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;_td=Math.sqrt(dx*dx+dy*dy);}},{passive:true});
CW.addEventListener('touchmove',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.sqrt(dx*dx+dy*dy);setZoom(S.zoom*(d/_td));_td=d;}},{passive:true});

// ═══ CANVAS CLICK ═════════════════════════════════════════════════════════
CW.addEventListener('click',e=>{
  if(!S.drawMode||S.locked) return;
  const r=CW.getBoundingClientRect();
  const gx=Math.round(p2g(e.clientX-r.left+CW.scrollLeft));
  const gy=Math.round(p2g(e.clientY-r.top+CW.scrollTop));
  if(gx<0||gy<0||gx>S.canvasSize||gy>S.canvasSize) return;
  fillCoord(gx,gy);
});
CW.addEventListener('touchend',e=>{
  if(!S.drawMode||S.locked||e.touches.length!==0||e.changedTouches.length!==1)return;
  const t=e.changedTouches[0],r=CW.getBoundingClientRect();
  const gx=Math.round(p2g(t.clientX-r.left+CW.scrollLeft));
  const gy=Math.round(p2g(t.clientY-r.top+CW.scrollTop));
  if(gx>=0&&gy>=0&&gx<=S.canvasSize&&gy<=S.canvasSize)fillCoord(gx,gy);
},{passive:true});
CW.addEventListener('mousemove',e=>{
  if(!S.drawMode){HI.style.display='none';return;}
  const r=CW.getBoundingClientRect();
  const gx=Math.round(p2g(e.clientX-r.left+CW.scrollLeft));
  const gy=Math.round(p2g(e.clientY-r.top+CW.scrollTop));
  HI.style.display='block'; HI.style.left=(g2p(gx)-10)+'px'; HI.style.top=(g2p(gy)-10)+'px';
  document.getElementById('s-c').textContent=`(${gx},${gy})`;
});
CW.addEventListener('mouseleave',()=>{HI.style.display='none';document.getElementById('s-c').textContent='—';});

document.getElementById('b-len').addEventListener('click',()=>{tog('b-len','showLengths');render();});
document.getElementById('b-ang').addEventListener('click',()=>{tog('b-ang','showAngles');render();});

document.getElementById('b-poly-close').addEventListener('click',()=>{S.polyClose=!S.polyClose;document.getElementById('b-poly-close').classList.toggle('on',S.polyClose);});
document.getElementById('b-lib-save').addEventListener('click',saveToLibrary);

document.getElementById('size-in').addEventListener('change',e=>{const v=parseInt(e.target.value);if(!isNaN(v)&&v>=1){S.canvasSize=Math.min(v,9999);render();}else e.target.value=S.canvasSize;});

// Style/Color

}));

// Coord inputs with Enter support
